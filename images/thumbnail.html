<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    width: 1080px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    font-family: 'Pretendard', -apple-system, 'Malgun Gothic', sans-serif;
    color: #ffffff;
    text-align: center;
    box-sizing: border-box;
    position: relative;
  }
  .category {
    font-size: 28px;
    color: #9ca3d4;
    letter-spacing: 4px;
    margin-bottom: 32px;
    text-transform: uppercase;
  }
  .title {
    font-size: 64px;
    font-weight: 800;
    line-height: 1.5;
    max-width: 880px;
    word-break: keep-all;
  }
  .highlight {
    color: #818cf8;
  }
  .subtitle {
    margin-top: 36px;
    font-size: 30px;
    color: #c7c9e8;
    font-weight: 500;
  }
  .accent {
    position: absolute;
    bottom: 60px;
    right: 60px;
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: #6366f1;
    font-family: monospace;
  }
  .accent2 {
    position: absolute;
    top: 60px;
    left: 60px;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(99,102,241,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
  }
</style>
</head>
<body>
  <div class="category">CLOUD MSP MARKET</div>
  <div class="title">메가존클라우드 경쟁사 총정리<br><span class="highlight">12조 MSP 시장</span> 판도는</div>
  <div class="subtitle">베스핀글로벌 · 메타넷엑스 · 삼성SDS · LG CNS</div>
  <div class="accent2">☁️</div>
  <div class="accent">&lt;/&gt;</div>
</body>
</html>
